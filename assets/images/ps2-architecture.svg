<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #102a43; }
      .label { font: 600 17px Arial, sans-serif; fill: #102a43; }
      .small { font: 500 14px Arial, sans-serif; fill: #334e68; }
      .box1 { fill: #e6f4ff; stroke: #2680c2; stroke-width: 2; rx: 14; }
      .box2 { fill: #eefcf2; stroke: #2f9e44; stroke-width: 2; rx: 14; }
      .box3 { fill: #fff4e6; stroke: #d9480f; stroke-width: 2; rx: 14; }
      .arrow { stroke: #486581; stroke-width: 3; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#486581" />
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#f8fbff" />
  <text x="40" y="50" class="title">PS2: Real-Time Horn Detection Smart Helmet - System Flow</text>

  <rect class="box1" x="50" y="110" width="230" height="110" />
  <text class="label" x="75" y="155">Helmet Mic Input</text>
  <text class="small" x="75" y="183">Traffic audio + wind noise</text>

  <rect class="box1" x="330" y="110" width="260" height="110" />
  <text class="label" x="360" y="155">Preprocessing</text>
  <text class="small" x="360" y="183">Noise reduction, framing, VAD</text>

  <rect class="box2" x="640" y="110" width="250" height="110" />
  <text class="label" x="667" y="155">Feature Extraction</text>
  <text class="small" x="667" y="183">MFCC / log-mel / spectral stats</text>

  <rect class="box2" x="940" y="110" width="210" height="110" />
  <text class="label" x="968" y="155">Horn Classifier</text>
  <text class="small" x="968" y="183">Tiny CNN / CRNN</text>

  <path class="arrow" d="M280 165 L330 165" />
  <path class="arrow" d="M590 165 L640 165" />
  <path class="arrow" d="M890 165 L940 165" />

  <rect class="box3" x="240" y="315" width="290" height="130" />
  <text class="label" x="265" y="360">Decision and Alert Logic</text>
  <text class="small" x="265" y="390">Confidence threshold + debounce</text>
  <text class="small" x="265" y="415">Direction cue + repeat control</text>

  <rect class="box3" x="610" y="315" width="260" height="130" />
  <text class="label" x="635" y="360">Rider Alert Output</text>
  <text class="small" x="635" y="390">Audio ducking / beep / haptic</text>
  <text class="small" x="635" y="415">Latency target: less than 200 ms</text>

  <rect class="box1" x="930" y="315" width="220" height="130" />
  <text class="label" x="955" y="360">Logging and Evaluation</text>
  <text class="small" x="955" y="390">FP, FN, precision, recall</text>
  <text class="small" x="955" y="415">Continuous model tuning</text>

  <path class="arrow" d="M1045 220 L1045 292" />
  <path class="arrow" d="M940 380 L870 380" />
  <path class="arrow" d="M610 380 L530 380" />
</svg>