<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #102a43; }
      .label { font: 600 17px Arial, sans-serif; fill: #102a43; }
      .small { font: 500 14px Arial, sans-serif; fill: #334e68; }
      .boxA { fill: #e8f7ff; stroke: #1c7ed6; stroke-width: 2; rx: 14; }
      .boxB { fill: #edfdf3; stroke: #2b8a3e; stroke-width: 2; rx: 14; }
      .boxC { fill: #fff4e6; stroke: #d9480f; stroke-width: 2; rx: 14; }
      .arrow { stroke: #486581; stroke-width: 3; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#486581" />
    </marker>
  </defs>

  <rect width="1200" height="600" fill="#f8fbff" />
  <text x="40" y="50" class="title">PS3: Two-Wheeler Driving Behavior Score - Explainable Pipeline</text>

  <rect class="boxA" x="40" y="100" width="230" height="120" />
  <text class="label" x="65" y="145">Sensor Inputs</text>
  <text class="small" x="65" y="173">Phone IMU, GPS, timestamp</text>
  <text class="small" x="65" y="197">Optional map/traffic context</text>

  <rect class="boxA" x="310" y="100" width="260" height="120" />
  <text class="label" x="336" y="145">Data Conditioning</text>
  <text class="small" x="336" y="173">Calibration, filtering, sync</text>
  <text class="small" x="336" y="197">Trip segmentation</text>

  <rect class="boxB" x="610" y="100" width="260" height="120" />
  <text class="label" x="635" y="145">Event Detection Layer</text>
  <text class="small" x="635" y="173">Brake, accel, overspeed</text>
  <text class="small" x="635" y="197">Harsh corner, weaving</text>

  <rect class="boxB" x="910" y="100" width="250" height="120" />
  <text class="label" x="936" y="145">Risk Scoring Model</text>
  <text class="small" x="936" y="173">Rule + ML hybrid scoring</text>
  <text class="small" x="936" y="197">Confidence weighted output</text>

  <path class="arrow" d="M270 160 L310 160" />
  <path class="arrow" d="M570 160 L610 160" />
  <path class="arrow" d="M870 160 L910 160" />

  <rect class="boxC" x="150" y="320" width="280" height="150" />
  <text class="label" x="175" y="365">Explainability Engine</text>
  <text class="small" x="175" y="393">Why score changed</text>
  <text class="small" x="175" y="417">Event severity and evidence</text>
  <text class="small" x="175" y="441">Segment level insights</text>

  <rect class="boxC" x="500" y="320" width="280" height="150" />
  <text class="label" x="525" y="365">Rider Feedback</text>
  <text class="small" x="525" y="393">Trip score 0 to 100</text>
  <text class="small" x="525" y="417">Unsafe moments and coaching</text>
  <text class="small" x="525" y="441">Trend over time</text>

  <rect class="boxA" x="850" y="320" width="300" height="150" />
  <text class="label" x="875" y="365">Validation Dashboard</text>
  <text class="small" x="875" y="393">Precision, recall, drift checks</text>
  <text class="small" x="875" y="417">Baseline vs improved score</text>
  <text class="small" x="875" y="441">Data quality monitoring</text>

  <path class="arrow" d="M1035 220 L1035 298" />
  <path class="arrow" d="M910 395 L780 395" />
  <path class="arrow" d="M500 395 L430 395" />
</svg>