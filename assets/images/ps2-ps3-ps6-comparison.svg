<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #102a43; }
      .head { font: 700 18px Arial, sans-serif; fill: #102a43; }
      .cell { font: 600 16px Arial, sans-serif; fill: #243b53; }
      .small { font: 500 14px Arial, sans-serif; fill: #486581; }
      .b { stroke: #bcccdc; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#f8fbff" />
  <text x="36" y="48" class="title">PS2 vs PS3 vs PS6 - Team Decision Matrix</text>

  <rect x="36" y="86" width="1128" height="60" fill="#d9ecff" class="b" />
  <text x="70" y="124" class="head">Criteria</text>
  <text x="430" y="124" class="head">PS2</text>
  <text x="700" y="124" class="head">PS3</text>
  <text x="970" y="124" class="head">PS6</text>

  <rect x="36" y="146" width="1128" height="84" fill="#ffffff" class="b" />
  <text x="70" y="191" class="cell">Prototype Speed</text>
  <text x="430" y="191" class="cell">High</text>
  <text x="700" y="191" class="cell">High</text>
  <text x="970" y="191" class="cell">Medium</text>

  <rect x="36" y="230" width="1128" height="84" fill="#eefcf2" class="b" />
  <text x="70" y="275" class="cell">Metric Clarity</text>
  <text x="430" y="275" class="cell">Medium-High</text>
  <text x="700" y="275" class="cell">Very High</text>
  <text x="970" y="275" class="cell">Medium</text>

  <rect x="36" y="314" width="1128" height="84" fill="#ffffff" class="b" />
  <text x="70" y="359" class="cell">Edge-Case Complexity</text>
  <text x="430" y="359" class="cell">Medium</text>
  <text x="700" y="359" class="cell">Medium</text>
  <text x="970" y="359" class="cell">High</text>

  <rect x="36" y="398" width="1128" height="84" fill="#fff4e6" class="b" />
  <text x="70" y="443" class="cell">Cost-to-Demo Ratio</text>
  <text x="430" y="443" class="cell">Good</text>
  <text x="700" y="443" class="cell">Best</text>
  <text x="970" y="443" class="cell">Moderate</text>

  <rect x="36" y="482" width="1128" height="84" fill="#ffffff" class="b" />
  <text x="70" y="527" class="cell">Suggested Pick</text>
  <text x="430" y="527" class="cell">Backup 1</text>
  <text x="700" y="527" class="cell">Primary</text>
  <text x="970" y="527" class="cell">Backup 2</text>

  <text x="36" y="602" class="small">Note: Use this matrix only as a prioritization aid. Final
    selection should consider current team skills and available data.</text>
</svg>